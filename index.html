<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN TOKENS ─────────────────────────────────────────── */
  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181b22;
    --border:    #1e2229;
    --border2:   #2a2f3a;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --accent:    #e8c547;      /* gold */
    --accent2:   #3b82f6;     /* blue */
    --live:      #ef4444;
    --finished:  #4b5563;
    --upcoming:  #3b82f6;
    --win:       #22c55e;
    --draw:      #f59e0b;
    --loss:      #ef4444;
    --fav:       #e8c547;
    --font-head: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --r:         8px;
    --r2:        12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ────────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 56px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
    white-space: nowrap;
    line-height: 1;
  }
  .logo span { color: var(--text); }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 5px 10px;
    border-radius: var(--r);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  #test-mode-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: var(--r);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  #test-mode-btn:hover { border-color: #f59e0b; color: #f59e0b; }
  #test-mode-btn.active { background: #f59e0b22; border-color: #f59e0b; color: #f59e0b; }
  .test-banner {
    background: #f59e0b22;
    border-bottom: 1px solid #f59e0b44;
    text-align: center;
    padding: 6px;
    font-size: 12px;
    color: #f59e0b;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  label { color: var(--muted); font-size: 12px; white-space: nowrap; }

  /* ── TABS ──────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 20px;
    position: sticky;
    top: 56px;
    z-index: 99;
  }
  .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 2px;
    width: 100%;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 14px 18px 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
    white-space: nowrap;
  }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── MAIN ──────────────────────────────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── LOADING / ERROR ───────────────────────────────────────── */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-msg .icon { font-size: 40px; margin-bottom: 12px; }
  .state-msg h3 { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LIVE TAB ──────────────────────────────────────────────── */
  .live-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .live-title {
    font-family: var(--font-head);
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .poll-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border2);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .poll-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50%       { opacity: .3; }
  }

  .date-group { margin-bottom: 28px; }
  .date-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .fixture-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 16px 20px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    transition: border-color .2s;
  }
  .fixture-card.fav-game {
    border-color: var(--fav);
    background: linear-gradient(135deg, #111318 0%, #1a1810 100%);
  }
  .fixture-card.is-live  { border-left: 3px solid var(--live); }
  .fixture-card.finished { opacity: .75; }

  .team-side { display: flex; align-items: center; gap: 10px; }
  .team-side.right { flex-direction: row-reverse; text-align: right; }
  .team-flag {
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 3px 5px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 36px;
    text-align: center;
  }
  .team-name { font-weight: 600; font-size: 15px; }
  .team-name.fav-team { color: var(--fav); }

  .score-block { text-align: center; min-width: 80px; }
  .score {
    font-family: var(--font-head);
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .score-sep { color: var(--muted); }
  .match-status {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .status-live     { color: var(--live); }
  .status-finished { color: var(--muted); }
  .status-upcoming { color: var(--upcoming); }
  .match-time { font-size: 12px; color: var(--muted); }

  .events-row {
    grid-column: 1 / -1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .event-chip {
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 2px 7px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .event-chip.goal   { border-color: #22c55e44; color: #22c55e; }
  .event-chip.yellow { border-color: #f59e0b44; color: #f59e0b; }
  .event-chip.red    { border-color: #ef444444; color: #ef4444; }
  .event-chip.subst  { border-color: #6b728044; color: var(--muted); }

  .fav-badge {
    font-size: 10px;
    background: var(--fav);
    color: #000;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: .5px;
  }

  /* ── GROUP TABLES TAB ─────────────────────────────────────── */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    overflow: hidden;
  }
  .group-card-header {
    background: var(--surface2);
    padding: 12px 16px;
    font-family: var(--font-head);
    font-size: 20px;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-table { width: 100%; border-collapse: collapse; }
  .group-table th {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .group-table th:first-child { text-align: left; }
  .group-table td {
    padding: 10px 12px;
    text-align: center;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
  }
  .group-table td:first-child {
    text-align: left;
    font-family: var(--font-body);
    font-weight: 500;
  }
  .group-table tr:last-child td { border-bottom: none; }
  .group-table tr.qualified td { color: var(--win); }
  .group-table tr.qualified td:first-child { font-weight: 700; }
  .group-table tr.eliminated td { opacity: .5; }
  .group-table tr.fav-row td { color: var(--fav); }
  .group-table tr.fav-row td:first-child { font-weight: 700; }

  .qual-badge {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: .5px;
    margin-left: 4px;
  }
  .qual-badge.q  { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
  .qual-badge.po { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }

  .scenario-box {
    padding: 10px 14px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }
  .scenario-box strong { color: var(--text); }

  /* ── MORNING CATCH-UP TAB ─────────────────────────────────── */
  .catchup-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .catchup-title {
    font-family: var(--font-head);
    font-size: 28px;
    letter-spacing: 1px;
  }
  .catchup-subtitle { color: var(--muted); font-size: 13px; }

  .spotlight-card {
    background: linear-gradient(135deg, #1a1810 0%, #111318 60%);
    border: 1px solid var(--fav);
    border-radius: var(--r2);
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .spotlight-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--fav);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .spotlight-match {
    font-family: var(--font-head);
    font-size: 28px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .spotlight-result { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

  .recap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .recap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 16px 18px;
  }
  .recap-card.fav-game { border-color: var(--fav); }
  .recap-match-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .recap-score {
    font-family: var(--font-head);
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .recap-events { font-size: 12px; color: var(--muted); line-height: 1.7; }
  /* ── CATCHUP REDESIGN ──────────────────────────────────────── */
  .catchup-date-section { margin-bottom: 32px; }
  .catchup-date-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .recap-card-full {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 16px 18px;
    margin-bottom: 10px;
    transition: border-color .2s;
  }
  .recap-card-full.fav-game {
    border-color: var(--fav);
    background: linear-gradient(135deg, #111318 0%, #1a1810 100%);
  }

  .recap-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .recap-left { flex: 1; }
  .recap-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .recap-match-title {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .recap-score-inline {
    font-family: var(--font-head);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .recap-events-line {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  .summary-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: var(--r);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .summary-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .summary-btn:disabled { opacity: .6; cursor: default; }

  .summary-box {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .summary-bullets {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .summary-bullets li {
    font-size: 13px;
    color: var(--text);
    padding-left: 16px;
    position: relative;
    line-height: 1.5;
  }
  .summary-bullets li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 11px;
    top: 2px;
  }

  .yt-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 10px;
    font-size: 12px;
    color: #ff4444;
    text-decoration: none;
    background: #ff444411;
    border: 1px solid #ff444433;
    border-radius: 5px;
    padding: 4px 9px;
    transition: background .2s;
  }
  .yt-link:hover { background: #ff444422; }

  /* ── UTILITY ───────────────────────────────────────────────── */
  .pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .pill-live     { background: #ef444422; color: var(--live);     border: 1px solid #ef444444; }
  .pill-finished { background: #4b556322; color: var(--muted);    border: 1px solid #4b556344; }
  .pill-upcoming { background: #3b82f622; color: var(--upcoming); border: 1px solid #3b82f644; }
  .pill-fav      { background: #e8c54722; color: var(--fav);      border: 1px solid #e8c54744; }

  .date-group.past-date { opacity: 0.5; }
  .date-group.past-date:hover { opacity: 0.75; transition: opacity .2s; }

  .today-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px !important;
    font-weight: 700 !important;
    color: var(--text) !important;
    letter-spacing: 0.5px !important;
    text-transform: none !important;
    margin-bottom: 12px !important;
  }
  .pill-today {
    background: #e8c54722;
    color: var(--accent);
    border: 1px solid #e8c54744;
  }

  /* "Jump to Today" sticky button — shown when today is off-screen */
  .jump-today-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #000;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 13px;
    border: none;
    border-radius: 24px;
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: 0 4px 20px #e8c54755;
    z-index: 200;
    display: none;
    align-items: center;
    gap: 6px;
    transition: transform .15s, box-shadow .15s;
  }
  .jump-today-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px #e8c54777; }
  .jump-today-btn.visible { display: flex; }

  .no-games {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 32px;
    text-align: center;
    color: var(--muted);
  }

  /* ── RESPONSIVE ────────────────────────────────────────────── */
  @media (max-width: 600px) {
    .header-inner { height: auto; padding: 10px 0; }
    .logo { font-size: 20px; }
    .fixture-card { grid-template-columns: 1fr auto 1fr; gap: 6px; padding: 12px 14px; }
    .score { font-size: 26px; }
    .team-name { font-size: 13px; }
    .team-flag { font-size: 9px; min-width: 28px; padding: 2px 4px; }
  }
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">WC<span>2026</span></div>
    <div class="header-controls">
      <label for="fav-select">⭐ Favourite</label>
      <select id="fav-select"></select>
      <label for="tz-select">🕐 Timezone</label>
      <select id="tz-select"></select>
      <button id="test-mode-btn" onclick="toggleTestMode()" title="Load fake data to preview the dashboard">🧪 Test Mode</button>
    </div>
  </div>
</header>

<!-- ── TABS ───────────────────────────────────────────────────────── -->
<div class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" data-tab="live">⚽ Fixtures</button>
    <button class="tab-btn" data-tab="groups">🏆 Group Tables</button>
    <button class="tab-btn" data-tab="catchup">☀️ Morning Catch-Up</button>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────────────── -->
<main>

  <!-- LIVE TAB -->
  <div class="tab-panel active" id="panel-live">
    <div class="live-header">
      <div class="live-title">Fixtures</div>
      <div class="poll-badge">
        <div class="poll-dot"></div>
        <span id="poll-countdown">Refreshing in 60s</span>
      </div>
    </div>
    <div id="live-content">
      <div class="state-msg"><div class="spinner"></div><p>Loading fixtures…</p></div>
    </div>
  </div>

  <!-- GROUP TABLES TAB -->
  <div class="tab-panel" id="panel-groups">
    <div class="live-header">
      <div class="live-title">Group Tables</div>
    </div>
    <div id="groups-content">
      <div class="state-msg"><div class="spinner"></div><p>Loading standings…</p></div>
    </div>
  </div>

  <!-- MORNING CATCH-UP TAB -->
  <div class="tab-panel" id="panel-catchup">
    <div id="catchup-content">
      <div class="state-msg"><div class="spinner"></div><p>Loading catch-up…</p></div>
    </div>
  </div>

</main>

<!-- Jump to Today floating button -->
<button class="jump-today-btn" id="jump-today-btn" onclick="jumpToToday()">⚽ Jump to Today</button>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════
const API_BASE    = "/.netlify/functions/api";
const LEAGUE_ID   = 1;               // FIFA World Cup 2026 on api-football.com
const SEASON      = 2026;
const POLL_SECS   = 60;

// ── TIMEZONES (hardcoded summer DST offsets) ───────────────────────

function setupJumpButton() {
  const btn = document.getElementById("jump-today-btn");
  if (!btn) return;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      btn.classList.toggle("visible", !e.isIntersecting);
    });
  }, { threshold: 0.1 });
  const liveContent = document.getElementById("live-content");
  new MutationObserver(() => {
    const todayEl = document.getElementById("today-section");
    if (todayEl) observer.observe(todayEl);
  }).observe(liveContent, { childList: true });
}

function jumpToToday() {
  const todayEl = document.getElementById("today-section");
  if (todayEl) todayEl.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── SELECTS ───────────────────────────────────────────────────────
function buildFavSelect() {
  const sel = document.getElementById("fav-select");
  TEAMS.forEach(([name, flag]) => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = `[${flag}] ${name}`;
    if (name === favTeam) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", () => {
    favTeam = sel.value;
    localStorage.setItem("wc_fav_team", favTeam);
    refreshCurrentTab();
  });
}

function buildTzSelect() {
  const sel = document.getElementById("tz-select");
  TIMEZONES.forEach(tz => {
    const opt = document.createElement("option");
    opt.value = tz.offset;
    opt.textContent = tz.label;
    if (tz.offset === tzOffset) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", () => {
    tzOffset = parseFloat(sel.value);
    localStorage.setItem("wc_tz_offset", tzOffset);
    refreshCurrentTab();
  });
}

// ── TABS ──────────────────────────────────────────────────────────
function setupTabs() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      activeTab = btn.dataset.tab;
      document.getElementById(`panel-${activeTab}`).classList.add("active");
      if (activeTab === "groups")  loadGroupsTab();
      if (activeTab === "catchup") loadCatchupTab();
    });
  });
}

function refreshCurrentTab() {
  if (activeTab === "live")   renderLive(cachedFixtures);
  if (activeTab === "groups") renderGroups(cachedStandings);
  if (activeTab === "catchup") renderCatchup(cachedRecap);
}

async function apiFetch(endpoint, params = {}) {
  const qs = new URLSearchParams({ league: LEAGUE_ID, season: SEASON, ...params });

function toLocalTime(utcString) {
  const d = new Date(utcString);
  const offsetMs = tzOffset * 3600000;
  const local = new Date(d.getTime() + offsetMs);
  const h = String(local.getUTCHours()).padStart(2, "0");
  const m = String(local.getUTCMinutes()).padStart(2, "0");
  return `${h}:${m}`;
}

function toLocalDateLabel(utcString) {
  const d = new Date(utcString);
  const offsetMs = tzOffset * 3600000;
  const local = new Date(d.getTime() + offsetMs);
  return local.toUTCString().split(" ").slice(0, 4).join(" ");
}

function todayLocalStr() {
  const now = new Date();
  const offsetMs = tzOffset * 3600000;
  const local = new Date(now.getTime() + offsetMs);
  return local.toISOString().slice(0, 10);
}

function localDateStr(utcString) {
  const d = new Date(utcString);
  const offsetMs = tzOffset * 3600000;
  const local = new Date(d.getTime() + offsetMs);
  return local.toISOString().slice(0, 10);
}

function startPollCountdown() {
  countdown = POLL_SECS;
  clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    countdown--;
    const el = document.getElementById("poll-countdown");
    if (el) el.textContent = `Refreshing in ${countdown}s`;
    if (countdown <= 0) {
      loadLiveTab(true);
      countdown = POLL_SECS;
    }
  }, 1000);
}

async function loadLiveTab(silent = false) {
  if (!silent) {
    document.getElementById("live-content").innerHTML =
      `<div class="state-msg"><div class="spinner"></div><p>Loading fixtures…</p></div>`;
  }
  try {
    // Fetch the full tournament schedule (no date filter = all fixtures)
    const data = await apiFetch("fixtures");
    cachedFixtures = data.response || [];
    renderLive(cachedFixtures);
  } catch (e) {
    document.getElementById("live-content").innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div><h3>Couldn't load fixtures</h3><p>${e.message}</p></div>`;
  }
}

function renderLive(fixtures) {
  if (!fixtures) return;
  const el = document.getElementById("live-content");
  if (!fixtures.length) {
    el.innerHTML = `<div class="no-games">No fixtures available yet. Check back soon!</div>`;
    return;
  }

  const today = todayLocalStr();

  // Check if any games are live right now
  const hasLive = fixtures.some(f =>
    ["1H","2H","ET","P","HT","BT"].includes(f.fixture.status.short)
  );

  // Sort all fixtures by date/time
  const sorted = [...fixtures].sort((a, b) => {
    // Within today: live first, then upcoming, then finished
    const aDate = localDateStr(a.fixture.date);
    const bDate = localDateStr(b.fixture.date);
    if (aDate === today && bDate === today) {
      const statusOrder = s => {
        if (["1H","2H","ET","P","HT","BT"].includes(s.short)) return 0;
        if (s.short === "NS") return 1;
        return 2;
      };
      const ao = statusOrder(a.fixture.status);
      const bo = statusOrder(b.fixture.status);
      if (ao !== bo) return ao - bo;
    }
    return new Date(a.fixture.date) - new Date(b.fixture.date);
  });

  // Group by local date
  const groups = {};
  sorted.forEach(f => {
    const d = localDateStr(f.fixture.date);
    if (!groups[d]) groups[d] = [];
    groups[d].push(f);
  });

  let html = "";
  Object.entries(groups).forEach(([dateStr, games]) => {
    const isToday = dateStr === today;
    const isPast  = dateStr < today;

    // Section wrapper — past dates get a dimmed class
    html += `<div class="date-group${isPast ? " past-date" : ""}" ${isToday ? `id="today-section"` : ""}>`;

    // Date label — today gets a highlighted pill
    if (isToday) {
      const liveCount = games.filter(f =>
        ["1H","2H","ET","P","HT","BT"].includes(f.fixture.status.short)
      ).length;
      html += `<div class="date-label today-label">
        <span>Today</span>
        ${liveCount > 0
          ? `<span class="pill pill-live">${liveCount} LIVE</span>`
          : `<span class="pill pill-today">TODAY</span>`}
      </div>`;
    } else {
      html += `<div class="date-label">${formatDateLabel(dateStr)}</div>`;
    }

    games.forEach(f => { html += buildFixtureCard(f); });
    html += `</div>`;
  });

  el.innerHTML = html;

  // Scroll to today's section smoothly
  const todayEl = document.getElementById("today-section");
  if (todayEl) {
    setTimeout(() => {
      todayEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 100);
  }
}

function buildFixtureCard(f) {
  const home     = f.teams.home.name;
  const away     = f.teams.away.name;
  const homeFlag = getTeamCode(home);
  const awayFlag = getTeamCode(away);
  const isFav    = home === favTeam || away === favTeam;
  const status   = f.fixture.status;
  const isLive   = ["1H","2H","ET","P","HT","BT"].includes(status.short);
  const isDone   = ["FT","AET","PEN"].includes(status.short);
  const kickoff  = toLocalTime(f.fixture.date);

  const homeScore = f.goals.home ?? "-";
  const awayScore = f.goals.away ?? "-";

  let statusHtml = "";
  if (isLive) {
    statusHtml = `<div class="match-status status-live">${status.elapsed || status.long}'</div>`;
  } else if (isDone) {
    statusHtml = `<div class="match-status status-finished">FT</div>`;
  } else {
    statusHtml = `<div class="match-status status-upcoming">${kickoff}</div>`;
  }

  const cardClass = [
    "fixture-card",
    isFav    ? "fav-game"  : "",
    isLive   ? "is-live"   : "",
    isDone   ? "finished"  : "",
  ].filter(Boolean).join(" ");

  const homeClass = `team-name${home === favTeam ? " fav-team" : ""}`;
  const awayClass = `team-name${away === favTeam ? " fav-team" : ""}`;

  // Build events
  const events = (f.events || []);
  let eventsHtml = "";
  if (events.length) {
    const chips = events.map(ev => {
      const isHome = ev.team.id === f.teams.home.id;
      if (ev.type === "Goal") {
        return `<span class="event-chip goal">⚽ ${ev.time.elapsed}' ${ev.player.name} (${isHome ? home : away})</span>`;
      } else if (ev.type === "Card") {
        const cls = ev.detail === "Yellow Card" ? "yellow" : "red";
        const icon = ev.detail === "Yellow Card" ? "🟨" : "🟥";
        return `<span class="event-chip ${cls}">${icon} ${ev.time.elapsed}' ${ev.player.name}</span>`;
      } else if (ev.type === "subst") {
        return `<span class="event-chip subst">🔄 ${ev.time.elapsed}' ${ev.assist.name} ↔ ${ev.player.name}</span>`;
      }
      return "";
    }).filter(Boolean);
    if (chips.length) {
      eventsHtml = `<div class="events-row">${chips.join("")}</div>`;
    }
  }

  const favLabel = isFav ? `<span class="fav-badge">⭐ FAV</span>` : "";

  return `
    <div class="${cardClass}">
      <div class="team-side left">
        <div class="team-flag">${homeFlag}</div>
        <div class="${homeClass}">${home} ${home === favTeam ? "⭐" : ""}</div>
        ${favLabel && home === favTeam ? favLabel : ""}
      </div>
      <div class="score-block">
        <div class="score">${homeScore} <span class="score-sep">–</span> ${awayScore}</div>
        ${statusHtml}
      </div>
      <div class="team-side right">
        ${away === favTeam ? favLabel : ""}
        <div class="${awayClass}">${away} ${away === favTeam ? "⭐" : ""}</div>
        <div class="team-flag">${awayFlag}</div>
      </div>
      ${eventsHtml}
    </div>`;
}

  }
}

function renderGroups(standings) {
  if (!standings) return;
  const el = document.getElementById("groups-content");
  if (!standings.length) {
    el.innerHTML = `<div class="no-games">Standings not yet available.</div>`;
    return;
  }

  // standings[0].league.standings is array of groups
  const groups = standings[0]?.league?.standings || [];

  let html = `<div class="groups-grid">`;
  groups.forEach(group => {
    if (!group.length) return;
    const groupName = group[0].group;
    html += `<div class="group-card">`;
    html += `<div class="group-card-header">${groupName}</div>`;
    html += `<table class="group-table">
      <thead>
        <tr>
          <th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th>
        </tr>
      </thead>
      <tbody>`;

    // Only show badges if games have been played in this group
    const gamesPlayed = group.reduce((sum, t) => sum + t.all.played, 0);

    group.forEach((t, i) => {
      const teamName = t.team.name;
      const isFavRow = teamName === favTeam;
      const isQual   = i < 2;
      const rowClass = isFavRow ? "fav-row" : (isQual && gamesPlayed > 0 ? "qualified" : "");

      const qualBadge = gamesPlayed === 0 ? "" : (
        isQual
          ? `<span class="qual-badge q">Q</span>`
          : (i === 2 ? `<span class="qual-badge po">PO</span>` : "")
      );

      html += `<tr class="${rowClass}">
        <td>${TEAM_FLAGS[teamName] || ""} ${teamName}${qualBadge}</td>
        <td>${t.all.played}</td>
        <td>${t.all.win}</td>
        <td>${t.all.draw}</td>
        <td>${t.all.lose}</td>
        <td>${t.goalsDiff > 0 ? "+" : ""}${t.goalsDiff}</td>
        <td><strong>${t.points}</strong></td>
      </tr>`;
    });

    html += `</tbody></table>`;

    // Qualification scenario for fav team's group
    const hasFav = group.find(t => t.team.name === favTeam);
    if (hasFav) {
      html += `<div class="scenario-box">${buildScenario(group, favTeam)}</div>`;
    }

    html += `</div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function buildScenario(group, team) {
  const sorted = [...group].sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    return b.goalsDiff - a.goalsDiff;
  });
  const pos    = sorted.findIndex(t => t.team.name === team) + 1;
  const entry  = sorted.find(t => t.team.name === team);
  const leader = sorted[0];

  if (!entry) return "";

  const ptsBehind = leader.points - entry.points;
  const gamesLeft = 3 - entry.all.played;

  if (pos === 1) return `<strong>${team}</strong> are top of the group. Win their remaining games to guarantee first place.`;
  if (pos === 2) return `<strong>${team}</strong> are 2nd. ${ptsBehind > 0 ? `${ptsBehind} point${ptsBehind>1?"s":""} behind 1st. ` : ""}${gamesLeft > 0 ? `${gamesLeft} game${gamesLeft>1?"s":""} remaining.` : "Group stage complete."}`;
  if (pos === 3) {
    const ptsNeeded = sorted[1].points - entry.points + 1;
    return `<strong>${team}</strong> need to gain <strong>${ptsNeeded}</strong> more point${ptsNeeded>1?"s":""} than the team above to qualify. ${gamesLeft} game${gamesLeft>1?"s":""} left.`;
  }
  return `<strong>${team}</strong> are in ${pos}${pos===4?"th":"rd"} place.`;
}

// localStorage key for persisted catch-up history
const CATCHUP_STORE_KEY = "wc_catchup_history";
// Cache for AI summaries: { fixtureId: ["bullet1","bullet2",...] }
const SUMMARY_CACHE_KEY = "wc_ai_summaries";

function loadCatchupHistory() {
  try { return JSON.parse(localStorage.getItem(CATCHUP_STORE_KEY) || "[]"); }
  catch { return []; }
}

function saveCatchupHistory(fixtures) {
  // Merge new finished fixtures into stored history, dedupe by fixture id
  const existing = loadCatchupHistory();
  const existingIds = new Set(existing.map(f => f.fixture.id));
  const merged = [
    ...fixtures.filter(f => !existingIds.has(f.fixture.id)),
    ...existing,
  ];
  // Keep max 200 games to avoid bloating localStorage
  localStorage.setItem(CATCHUP_STORE_KEY, JSON.stringify(merged.slice(0, 200)));
  return merged;
}

function loadSummaryCache() {
  try { return JSON.parse(localStorage.getItem(SUMMARY_CACHE_KEY) || "{}"); }
  catch { return {}; }
}

function saveSummaryCache(cache) {
  localStorage.setItem(SUMMARY_CACHE_KEY, JSON.stringify(cache));
}

async function loadCatchupTab() {
  document.getElementById("catchup-content").innerHTML =
    `<div class="state-msg"><div class="spinner"></div><p>Loading catch-up…</p></div>`;
  try {
    const now = new Date();
    const yesterday = new Date(now.getTime() - 86400000).toISOString().slice(0, 10);
    const [ydayData, todayData] = await Promise.all([
      apiFetch("fixtures", { date: yesterday }),
      apiFetch("fixtures", { date: todayLocalStr() }),
    ]);
    const allFixtures = [
      ...(ydayData.response || []),
      ...(todayData.response || []),
    ];
    const finished = allFixtures.filter(f =>
      ["FT","AET","PEN"].includes(f.fixture.status.short)
    );
    // Persist and merge with history
    const allHistory = saveCatchupHistory(finished);
    cachedRecap = allHistory;
    renderCatchup(allHistory);
  } catch (e) {
    // Even on error, show whatever is in history
    const history = loadCatchupHistory();
    if (history.length) {
      cachedRecap = history;
      renderCatchup(history);
    } else {
      document.getElementById("catchup-content").innerHTML =
        `<div class="state-msg"><div class="icon">⚠️</div><h3>Couldn't load catch-up</h3><p>${e.message}</p></div>`;
    }
  }
}

function fixtureKey(f) {
  return `${f.fixture.id || (f.teams.home.name + "_" + f.teams.away.name + "_" + f.fixture.date)}`;
}

async function generateSummary(f) {
  const cache = loadSummaryCache();
  const key = fixtureKey(f);
  if (cache[key]) return cache[key]; // already generated

  const home = f.teams.home.name;
  const away = f.teams.away.name;
  const score = `${f.goals.home}-${f.goals.away}`;
  const goals = (f.events || []).filter(e => e.type === "Goal").map(e =>
    `${e.time.elapsed}' ${e.player.name} (${e.team.id === f.teams.home.id ? home : away})`
  );
  const cards = (f.events || []).filter(e => e.type === "Card").map(e =>
    `${e.detail} ${e.time.elapsed}' ${e.player.name}`
  );

  const prompt = `You are a football match reporter. Write exactly 5 short punchy bullet points summarising this World Cup match. Each bullet max 15 words. No intro text, just the 5 bullets as a JSON array of strings.

Match: ${home} ${score} ${away}
Goals: ${goals.length ? goals.join(", ") : "none"}
Cards: ${cards.length ? cards.join(", ") : "none"}
Status: ${f.fixture.status.long}

Respond ONLY with a JSON array, e.g. ["bullet 1","bullet 2","bullet 3","bullet 4","bullet 5"]`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || "[]";
    const clean = text.replace(/```json|```/g, "").trim();
    const bullets = JSON.parse(clean);
    cache[key] = bullets;
    saveSummaryCache(cache);
    return bullets;
  } catch {
    return null;
  }
}

async function renderCatchup(fixtures) {
  if (!fixtures) return;
  const el = document.getElementById("catchup-content");

  // Sort newest first
  const sorted = [...fixtures].sort((a, b) =>
    new Date(b.fixture.date) - new Date(a.fixture.date)
  );

  // Group by date label
  const groups = {};
  sorted.forEach(f => {
    const d = localDateStr(f.fixture.date);
    if (!groups[d]) groups[d] = [];
    groups[d].push(f);
  });

  let html = `<div class="catchup-header">
    <div class="catchup-title">Morning Catch-Up</div>
    <div class="catchup-subtitle">${sorted.length} game${sorted.length !== 1 ? "s" : ""} · most recent first</div>
  </div>`;

  if (!sorted.length) {
    html += `<div class="no-games">No completed games yet. Check back once the tournament starts!</div>`;
    el.innerHTML = html;
    return;
  }

  Object.entries(groups).forEach(([dateStr, games]) => {
    const isFavDate = games.some(f =>
      f.teams.home.name === favTeam || f.teams.away.name === favTeam
    );
    html += `<div class="catchup-date-section">`;
    html += `<div class="catchup-date-label">${formatDateLabel(dateStr)}</div>`;

    // Fav team game first within each date
    const favGame = games.find(f =>
      f.teams.home.name === favTeam || f.teams.away.name === favTeam
    );
    const otherGames = games.filter(f =>
      f.teams.home.name !== favTeam && f.teams.away.name !== favTeam
    );
    const orderedGames = favGame ? [favGame, ...otherGames] : otherGames;

    orderedGames.forEach(f => {
      const isFav = f.teams.home.name === favTeam || f.teams.away.name === favTeam;
      const h = f.teams.home;
      const a = f.teams.away;
      const hFlag = getTeamCode(h.name);
      const aFlag = getTeamCode(a.name);
      const isFavHome = h.name === favTeam;
      const favScore  = isFavHome ? f.goals.home : f.goals.away;
      const oppScore  = isFavHome ? f.goals.away : f.goals.home;
      const result    = isFav ? (favScore > oppScore ? "WIN 🎉" : favScore < oppScore ? "LOSS 😔" : "DRAW 🤝") : "";
      const fKey      = fixtureKey(f);

      html += `<div class="recap-card-full${isFav ? " fav-game" : ""}" id="card-${fKey}">
        <div class="recap-card-top">
          <div class="recap-left">
            ${isFav ? `<div class="spotlight-label" style="margin-bottom:6px">⭐ ${favTeam} ${result}</div>` : ""}
            <div class="recap-match-title">
              <span class="team-flag">${hFlag}</span> ${h.name}
              <span class="recap-score-inline">${f.goals.home} – ${f.goals.away}</span>
              <span class="team-flag">${aFlag}</span> ${a.name}
            </div>
            <div class="recap-events-line">${buildCatchupEventsInline(f)}</div>
          </div>
          <div class="recap-right">
            <a class="yt-link" href="${ytSearchUrl(h.name, a.name)}" target="_blank" rel="noopener">▶ Highlights</a>
            <button class="summary-btn" onclick="loadSummaryForCard('${fKey}', this)" data-fkey="${fKey}">
              ✦ AI Summary
            </button>
          </div>
        </div>
        <div class="summary-box" id="summary-${fKey}" style="display:none"></div>
      </div>`;
    });

    html += `</div>`;
  });

  el.innerHTML = html;

  // Auto-generate summaries for fav team games (background, no wait)
  sorted.filter(f =>
    f.teams.home.name === favTeam || f.teams.away.name === favTeam
  ).forEach(f => {
    const key = fixtureKey(f);
    const cache = loadSummaryCache();
    if (!cache[key]) {
      generateSummary(f); // fire and forget — populates cache for next click
    }
  });
}

async function loadSummaryForCard(fKey, btn) {
  const box = document.getElementById(`summary-${fKey}`);
  if (!box) return;

  // Toggle off if already visible
  if (box.style.display !== "none") {
    box.style.display = "none";
    btn.textContent = "✦ AI Summary";
    return;
  }

  btn.textContent = "⏳ Generating…";
  btn.disabled = true;

  // Find fixture from cachedRecap
  const f = cachedRecap.find(x => fixtureKey(x) === fKey);
  if (!f) { btn.textContent = "✦ AI Summary"; btn.disabled = false; return; }

  const bullets = await generateSummary(f);
  btn.textContent = "✦ AI Summary";
  btn.disabled = false;

  if (!bullets || !bullets.length) {
    box.innerHTML = `<p style="color:var(--muted);font-size:12px">Couldn't generate summary.</p>`;
  } else {
    box.innerHTML = `<ul class="summary-bullets">${bullets.map(b => `<li>${b}</li>`).join("")}</ul>`;
  }
  box.style.display = "block";
}

function buildCatchupEventsInline(f) {
  const goals = (f.events || []).filter(ev => ev.type === "Goal");
  const cards = (f.events || []).filter(ev => ev.type === "Card" && ev.detail === "Red Card");
  const parts = [];
  if (goals.length) {
    parts.push("⚽ " + goals.map(ev => {
      const isHome = ev.team.id === f.teams.home.id;
      return `${ev.time.elapsed}' ${ev.player.name} (${isHome ? f.teams.home.name : f.teams.away.name})`;
    }).join(" · "));
  }
  if (cards.length) {
    parts.push("🟥 " + cards.map(ev => `${ev.time.elapsed}' ${ev.player.name}`).join(", "));
  }
  return parts.join("  ·  ") || "No event data available";
}

function buildCatchupEventsText(f) {
  const goals = (f.events || []).filter(ev => ev.type === "Goal");
  if (!goals.length) return "No goal data available.";
  return goals.map(ev => {
    const isHome = ev.team.id === f.teams.home.id;
    return `⚽ ${ev.time.elapsed}' ${ev.player.name} (${isHome ? f.teams.home.name : f.teams.away.name})`;
  }).join("<br>");
}

function ytSearchUrl(home, away) {
  const q = encodeURIComponent(`${home} vs ${away} WC2026 highlights`);
  return `https://www.youtube.com/results?search_query=${q}`;
}

let testModeActive = false;

function toggleTestMode() {
  testModeActive = !testModeActive;
  const btn = document.getElementById("test-mode-btn");
  btn.classList.toggle("active", testModeActive);
  btn.textContent = testModeActive ? "🧪 Exit Test Mode" : "🧪 Test Mode";

  // Show/hide banner
  let banner = document.getElementById("test-banner");
  if (testModeActive) {
    if (!banner) {
      banner = document.createElement("div");
      banner.id = "test-banner";
      banner.className = "test-banner";
      banner.textContent = "⚠️ TEST MODE — showing fake data, not real API results";
      document.querySelector(".tabs").after(banner);
    }
    // Load mock data into all tabs
    cachedFixtures  = getMockFixtures();
    cachedRecap     = getMockRecap();
    cachedStandings = getMockStandings();
    if (activeTab === "live")    renderLive(cachedFixtures);
    if (activeTab === "groups")  renderGroups(cachedStandings);
    // Switch to catchup to show it off
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.querySelector('[data-tab="catchup"]').classList.add("active");
    document.getElementById("panel-catchup").classList.add("active");
    activeTab = "catchup";
    renderCatchup(cachedRecap);
  } else {
    if (banner) banner.remove();
    cachedFixtures = null; cachedRecap = null; cachedStandings = null;
    loadLiveTab();
    if (activeTab === "catchup") loadCatchupTab();
    if (activeTab === "groups")  loadGroupsTab();
  }
}

function makeFakeFixture(homeTeam, awayTeam, homeGoals, awayGoals, status, elapsed, events, dateOffset = 0) {
  const d = new Date();
  d.setHours(d.getHours() - dateOffset);
  return {
    fixture: {
      id: Math.random(),
      date: d.toISOString(),
      status: { short: status, long: status === "FT" ? "Match Finished" : status === "1H" ? "First Half" : "Not Started", elapsed }
    },
    league: { name: "FIFA World Cup", round: "Group Stage - 1" },
    teams: {
      home: { id: 1, name: homeTeam },
      away: { id: 2, name: awayTeam }
    },
    goals: { home: homeGoals, away: awayGoals },
    events: events || []
  };
}

function formatDateLabel(dateStr) {
  const today     = todayLocalStr();
  const yesterday = new Date(new Date().getTime() - 86400000).toISOString().slice(0, 10);
  if (dateStr === today)     return "Today";
  if (dateStr === yesterday) return "Yesterday";
  const d = new Date(dateStr + "T12:00:00Z");
  return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
}
